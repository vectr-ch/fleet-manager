name: CI / Deploy

on:
  push:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vectr-ch/fleet-manager
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Pull image on target host
        uses: appleboy/ssh-action@v1
        with:
          host: vectr.tail255939.ts.net
          username: services
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            export DOCKER_HOST=unix:///run/user/1001/docker.sock
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/vectr-ch/fleet-manager:latest
            docker logout ghcr.io

      - name: Restart application container
        uses: appleboy/ssh-action@v1
        with:
          host: vectr.tail255939.ts.net
          username: services
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            export DOCKER_HOST=unix:///run/user/1001/docker.sock
            docker network create vectr 2>/dev/null || true
            docker stop fleet-manager || true
            docker rm fleet-manager || true
            docker run -d \
              --name fleet-manager \
              --restart unless-stopped \
              --network vectr \
              -p 3001:3000 \
              ghcr.io/vectr-ch/fleet-manager:latest
